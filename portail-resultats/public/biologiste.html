<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Espace Biologiste</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <h1 class="title">Espace Biologiste</h1>
      <div class="actions">
        <a class="pill" href="/">Espace patient</a>
      </div>
    </div>

    <div id="loginCard" class="card login">
      <div class="row">
        <div class="muted">Acces reserve biologiste. Journalisation obligatoire en production.</div>
        <div class="field">
          <label for="username">Utilisateur</label>
          <input id="username" placeholder="biologiste">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" placeholder="********">
        </div>
        <div class="actions">
          <button id="loginBtn" class="btn">Se connecter</button>
        </div>
        <div id="loginError" class="muted"></div>
      </div>
    </div>

    <section id="app" class="app-stack" style="display:none">
      <div class="card view-switch">
        <button id="viewChatBtn" class="btn secondary active" type="button">Conversations</button>
        <button id="viewAdminBtn" class="btn secondary" type="button">Administration</button>
      </div>

      <section id="chatView" class="layout">
        <aside class="card panel">
          <div class="panel-head">
            <h3 id="bioLabel">Inbox protocoles</h3>
            <button id="logoutBtn" class="btn secondary">Deconnexion</button>
          </div>
          <div class="panel-head" style="border-top:1px solid var(--line); border-bottom:1px solid var(--line)">
            <div class="field" style="width:100%; margin:0">
              <select id="statusFilter">
                <option value="">Tous statuts</option>
                <option value="open">open</option>
                <option value="answered">answered</option>
                <option value="closed">closed</option>
              </select>
            </div>
          </div>
          <div id="protocolList" class="list"></div>
        </aside>

        <section class="card conversation">
          <div class="panel-head">
            <h3 id="protocolTitle">Selectionnez un protocole</h3>
            <div class="actions">
              <select id="statusSelect" style="display:none">
                <option value="open">open</option>
                <option value="answered">answered</option>
                <option value="closed">closed</option>
              </select>
              <button id="saveStatusBtn" class="btn secondary" style="display:none">Maj statut</button>
              <a id="pdfLink" class="btn secondary" href="#" target="_blank" rel="noopener noreferrer" style="display:none">Ouvrir PDF</a>
            </div>
          </div>
          <div id="pdfPanel" class="pdf-panel" style="display:none">
            <iframe id="pdfEmbed" class="pdf-embed" title="PDF du protocole"></iframe>
          </div>
          <div id="thread" class="thread">
            <div class="empty">Aucun message.</div>
          </div>
          <div class="composer">
            <div class="field">
              <label for="messageBody">Reponse biologiste</label>
              <textarea id="messageBody" placeholder="Saisir une reponse au patient..."></textarea>
            </div>
            <div class="actions">
              <button id="sendBtn" class="btn">Envoyer la reponse</button>
            </div>
          </div>
        </section>
      </section>

      <section id="adminView" class="admin-layout" style="display:none">
        <aside class="card panel admin-panel">
          <div class="panel-head">
            <h3>Creation rapide</h3>
          </div>

          <form id="patientFormAdmin" class="card admin-card">
            <h4>Nouveau patient</h4>
            <div class="field">
              <label for="fullNameAdmin">Nom complet</label>
              <input id="fullNameAdmin" required>
            </div>
            <div class="field">
              <label for="phoneAdmin">Telephone</label>
              <input id="phoneAdmin" type="tel" placeholder="06 12 34 56 78" required>
            </div>
            <div class="field">
              <label for="birthDateAdmin">Date de naissance</label>
              <input id="birthDateAdmin" type="date" required>
            </div>
            <div class="actions">
              <button id="createPatientBtnAdmin" class="btn" type="submit">Ajouter patient</button>
            </div>
            <div id="patientFeedbackAdmin" class="muted"></div>
          </form>

          <form id="protocolFormAdmin" class="card admin-card">
            <h4>Nouveau protocole</h4>
            <div class="field">
              <label for="patientIdAdmin">Patient</label>
              <select id="patientIdAdmin" required></select>
            </div>
            <div class="field">
              <label for="protocolTitleAdmin">Titre</label>
              <input id="protocolTitleAdmin" placeholder="Profil thyroidien" required>
            </div>
            <div class="field">
              <label for="collectedAtAdmin">Date prelevement</label>
              <input id="collectedAtAdmin" type="date">
            </div>
            <div class="field">
              <label for="pdfUrlAdmin">URL PDF</label>
              <input id="pdfUrlAdmin" placeholder="https://.../fiches/profil-thyroidien.pdf">
            </div>
            <div class="field">
              <label for="protocolStatusAdmin">Statut</label>
              <select id="protocolStatusAdmin">
                <option value="open">open</option>
                <option value="answered">answered</option>
                <option value="closed">closed</option>
              </select>
            </div>
            <div class="actions">
              <button id="createProtocolBtnAdmin" class="btn" type="submit">Ajouter protocole</button>
            </div>
            <div id="protocolFeedbackAdmin" class="muted"></div>
          </form>
        </aside>

        <section class="card admin-main">
          <div class="panel-head">
            <h3 id="adminLabelBio">Administration</h3>
            <div class="actions">
              <button id="refreshAdminBtn" class="btn secondary" type="button">Rafraichir</button>
              <button id="logoutBtnAdmin" class="btn secondary" type="button">Deconnexion</button>
            </div>
          </div>

          <div class="admin-content">
            <section class="admin-block">
              <h4>Patients</h4>
              <div id="patientsTableAdmin" class="table-wrap"></div>
            </section>

            <section class="admin-block">
              <h4>Protocoles</h4>
              <div id="protocolsTableAdmin" class="table-wrap"></div>
            </section>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="/biologiste.js"></script>
</body>
</html>
