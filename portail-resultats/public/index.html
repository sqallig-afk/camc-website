<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portail Resultats Patient</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <h1 class="title">Portail Resultats Patient</h1>
      <div class="actions">
        <a class="pill" href="/biologiste.html">Espace biologiste</a>
      </div>
    </div>

    <div id="loginCard" class="card login">
      <div class="row">
        <div class="muted">Connexion privee patient par telephone et date de naissance.</div>
        <div class="field">
          <label for="phone">Telephone</label>
          <input id="phone" type="tel" placeholder="06 12 34 56 78">
        </div>
        <div class="field">
          <label for="birthDate">Date de naissance</label>
          <input id="birthDate" type="date">
        </div>
        <div class="actions">
          <button id="loginBtn" class="btn">Se connecter</button>
        </div>
        <div id="loginError" class="muted"></div>
      </div>
    </div>

    <section id="app" class="layout" style="display:none">
      <aside class="card panel">
        <div class="panel-head">
          <h3 id="patientLabel">Mes protocoles</h3>
          <button id="logoutBtn" class="btn secondary">Deconnexion</button>
        </div>
        <div id="protocolList" class="list"></div>
      </aside>

      <section class="card conversation">
        <div class="panel-head">
          <h3 id="protocolTitle">Selectionnez un protocole</h3>
          <div class="actions">
            <a id="pdfLink" class="btn secondary" href="#" target="_blank" rel="noopener noreferrer" style="display:none">Ouvrir PDF</a>
          </div>
        </div>
        <div id="pdfPanel" class="pdf-panel" style="display:none">
          <iframe id="pdfEmbed" class="pdf-embed" title="PDF du protocole"></iframe>
        </div>
        <div id="thread" class="thread">
          <div class="empty">Aucun message pour le moment.</div>
        </div>
        <div class="composer">
          <div class="field">
            <label for="messageBody">Question au biologiste</label>
            <textarea id="messageBody" placeholder="Posez votre question sur ce protocole..."></textarea>
          </div>
          <div class="actions">
            <button id="sendBtn" class="btn">Envoyer</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="/patient.js"></script>
</body>
</html>
